name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        env:
          CXXFLAGS: -std=c++20
        run: npm ci

      - name: Verify tree-sitter runtime
        if: matrix.node == 24
        run: npm run verify:tree-sitter

      - name: Run tests
        run: npm test

      - name: Run code-index benchmark gate
        if: matrix.node == 24
        run: npm run bench:index:check

      - name: Run coverage
        if: matrix.node == 24
        run: npm run test:coverage
